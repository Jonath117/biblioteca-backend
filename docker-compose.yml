services:
  # ==========================================
  # INFRAESTRUCTURA DE APOYO
  # ==========================================
  db_biblioteca:
    image: postgres:15-alpine
    container_name: ucb_postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: ucb_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # ==========================================
  # CAPA DE APLICACIÓN (NUESTROS DOCKERFILES)
  # ==========================================
  backend_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ucb_backend_api
    restart: always
    ports:
      - "5198:8080"
    env_file:
      - .env
    depends_on:
      - db_biblioteca
      - minio

  frontend_web:
    build:
      context: ../biblioteca-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: ucb_frontend_web
    restart: always
    ports:
      # Nginx sirve la página en el puerto 80 dentro del contenedor.
      # Lo mapeamos al 5173 para no romper las políticas de CORS
      - "5173:80"
    depends_on:
      - backend_api

volumes:
  pgdata:
  minio_data: